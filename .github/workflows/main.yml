name: Deploy Flask App to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            APP_DIR=~/apps/flaskdemodevops
            REPO_URL=https://github.com/eshan-singh78/flaskdemodevops.git

            # Create apps directory
            mkdir -p ~/apps

            # Clone if not present
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            git pull origin main

            # Create virtual environment if needed
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            . venv/bin/activate

            pip install -r requirements.txt

            echo "Stopping old app..."
            OLD_PIDS=$(pgrep -f "python.*app.py" || true)
            if [ -n "$OLD_PIDS" ]; then
              echo "Found old app pids: $OLD_PIDS"
              kill $OLD_PIDS || true
              sleep 2
            else
              echo "No running app process found."
            fi

            echo "Starting new app..."
            nohup venv/bin/python app.py > app.log 2>&1 < /dev/null &

            sleep 5

            echo "Checking process..."
            pgrep -f "app.py" || true